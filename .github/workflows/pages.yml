name: Deploy Wiki to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "wiki/**"
      - "wiki-en/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site (wiki + wiki-en)
        run: |
          mkdir -p _site
          cp -r wiki      _site/wiki
          cp -r wiki-en   _site/wiki-en
          # Docsify tarafinda Jekyll islenmesini kapat
          touch _site/.nojekyll
          # Kok dizin: dil secme sayfasi
          cp .github/pages-index.html _site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
