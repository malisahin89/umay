<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Umay Framework — Dokümantasyon</title>
  <style>
    :root { --theme: #f05340; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      color: #fff;
      padding: 24px;
    }
    h1 { font-size: clamp(1.8rem, 5vw, 2.6rem); margin-bottom: 8px; }
    p  { color: #aaa; margin-bottom: 40px; }
    .langs { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
    a.card {
      display: block;
      text-decoration: none;
      color: #fff;
      background: #262626;
      border: 1px solid #333;
      border-radius: 14px;
      padding: 28px 40px;
      min-width: 180px;
      text-align: center;
      transition: transform .15s ease, border-color .15s ease;
    }
    a.card:hover { transform: translateY(-4px); border-color: var(--theme); }
    .flag { font-size: 2.4rem; display: block; margin-bottom: 10px; }
    .name { font-size: 1.2rem; font-weight: 600; }
    .sub  { font-size: .85rem; color: #888; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>Umay Framework</h1>
  <p>Dokümantasyon dili seçin · Choose your language</p>
  <div class="langs">
    <a class="card" href="./wiki/">
      <span class="flag">🇹🇷</span>
      <span class="name">Türkçe</span>
      <span class="sub">Dokümantasyon</span>
    </a>
    <a class="card" href="./wiki-en/">
      <span class="flag">🇬🇧</span>
      <span class="name">English</span>
      <span class="sub">Documentation</span>
    </a>
  </div>
</body>
</html>
